<!DOCTYPE html>
<html lang="de">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Dein Name</title>

    <meta name="description" content="Alle meine Links an einem Ort.">

    <meta name="theme-color" content="#050816">

    <!-- Open Graph -->
    <meta property="og:title" content="Dein Name">
    <meta property="og:description" content="Creator • Developer">
    <meta property="og:image" content="assets/avatar.jpg">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" href="assets/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Aurora -->

    <div class="aurora"></div>
    <div class="noise"></div>
    <div class="cursor"></div>

    <!-- Decorative Blobs -->

    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <!-- Main Card -->

    <main class="glass">

        <div class="glass-highlight"></div>

        <header>

            <div class="avatar-wrapper">

                <div class="avatar-ring"></div>

                <img
                    class="avatar"
                    src="assets/avatar.jpg"
                    alt="Profilbild">

            </div>

            <h1>Dein Name</h1>

            <p class="subtitle">
                Creator · Developer · Designer
            </p>

        </header>

        <section class="bio">

            Ich entwickle Websites, Apps und Designs.
            Willkommen auf meiner kleinen Ecke des Internets.

        </section>

        <nav class="links">

            <a href="#" target="_blank">

                <span>📸</span>

                <span>Instagram</span>

                <svg viewBox="0 0 24 24">

                    <path d="M7 17L17 7"/>

                    <path d="M9 7H17V15"/>

                </svg>

            </a>

            <a href="#" target="_blank">

                <span>🎵</span>

                <span>TikTok</span>

                <svg viewBox="0 0 24 24">

                    <path d="M7 17L17 7"/>

                    <path d="M9 7H17V15"/>

                </svg>

            </a>

            <a href="#" target="_blank">

                <span>▶</span>

                <span>YouTube</span>

                <svg viewBox="0 0 24 24">

                    <path d="M7 17L17 7"/>

                    <path d="M9 7H17V15"/>

                </svg>

            </a>

            <a href="#" target="_blank">

                <span>💬</span>

                <span>Discord</span>

                <svg viewBox="0 0 24 24">

                    <path d="M7 17L17 7"/>

                    <path d="M9 7H17V15"/>

                </svg>

            </a>

            <a href="#" target="_blank">

                <span>💻</span>

                <span>GitHub</span>

                <svg viewBox="0 0 24 24">

                    <path d="M7 17L17 7"/>

                    <path d="M9 7H17V15"/>

                </svg>

            </a>

        </nav>

        <footer>

            <small>

                Built with ♥ • 2026

            </small>

        </footer>

    </main>

    <script src="script.js"></script>

</body>

</html>
